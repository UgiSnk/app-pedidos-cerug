<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmar Entrega - CERUG</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: {
              400: '#DCC39A',
              500: '#C5A880',
              600: '#B0926A',
            },
            dark: {
              900: '#111111',
              800: '#1A1A1A',
              700: '#262626',
            }
          }
        }
      }
    }
  </script>
  
  <!-- Estilos Premium Personalizados -->
  <link rel="stylesheet" href="styles.css?v=1.2">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #111111;
      color: #FFFFFF;
    }
    .serif-title {
      font-family: 'Lora', serif;
    }
    .glass-card {
      background: rgba(26, 26, 26, 0.8);
      backdrop-filter: blur(12px);
      border: 1px border rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body class="relative min-h-screen flex flex-col justify-center items-center px-4 py-8 overflow-x-hidden">
  
  <!-- Orbes de Luz de fondo -->
  <div class="glow-orb orb-green opacity-40"></div>
  <div class="glow-orb orb-teal opacity-30"></div>

  <!-- Contenedor Principal -->
  <div class="w-full max-w-md relative z-10">
    
    <!-- Cabecera de la Marca -->
    <div class="text-center mb-6">
      <h1 class="serif-title text-3xl font-bold tracking-wider text-gold-400">CERUG</h1>
      <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Confirmación de Entregas</p>
    </div>

    <!-- 1. Cargando -->
    <div id="loading-container" class="glass-card p-8 rounded-2xl border border-white/5 shadow-2xl flex flex-col items-center justify-center gap-4 text-center">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-gold-400"></div>
      <p class="text-sm text-gray-400">Cargando detalles del pedido...</p>
    </div>

    <!-- 2. Pantalla de Login -->
    <div id="login-container" class="hidden glass-card p-8 rounded-2xl border border-white/5 shadow-2xl animate-fade-in">
      <h2 class="serif-title text-xl font-semibold text-center mb-6 text-white">Iniciar Sesión (Vendedor)</h2>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-xs uppercase tracking-wider text-gray-400 mb-2">Correo Electrónico</label>
          <input id="login-email" type="email" placeholder="matias@cerug.com" class="w-full bg-dark-700/60 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gold-400 text-white" required>
        </div>
        <div>
          <label class="block text-xs uppercase tracking-wider text-gray-400 mb-2">Contraseña</label>
          <input id="login-password" type="password" placeholder="••••••••" class="w-full bg-dark-700/60 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gold-400 text-white" required>
        </div>
        <button type="submit" class="w-full bg-gold-400 hover:bg-gold-500 text-dark-900 font-bold py-3.5 rounded-xl transition duration-300 tracking-wide mt-2">
          Ingresar
        </button>
      </form>
      <div id="login-error" class="hidden mt-4 p-3 bg-red-950/80 border border-red-800 text-red-300 rounded-xl text-xs text-center"></div>
    </div>

    <!-- 3. Detalle y Confirmación del Pedido -->
    <div id="order-container" class="hidden glass-card p-6 rounded-2xl border border-white/5 shadow-2xl animate-fade-in">
      <!-- Encabezado Pedido -->
      <div class="border-b border-white/10 pb-4 mb-4">
        <div class="flex justify-between items-center mb-1">
          <span class="text-xs font-semibold text-gold-400 uppercase tracking-wider">Detalles del Pedido</span>
          <span id="order-status-badge" class="px-2.5 py-0.5 rounded-full text-2xs font-bold uppercase tracking-wider"></span>
        </div>
        <h3 id="client-name-title" class="serif-title text-2xl font-bold text-white">Cargando...</h3>
        <p id="order-date" class="text-3xs text-gray-400 mt-1"></p>
        <p id="seller-name-title" class="text-xs text-gold-400 mt-1 font-semibold"></p>
      </div>

      <!-- Ítems del Pedido -->
      <div class="space-y-3 max-h-48 overflow-y-auto mb-4 pr-1">
        <div id="items-list" class="space-y-2">
          <!-- Dinámico -->
        </div>
      </div>

      <!-- Total -->
      <div class="flex justify-between items-center border-t border-white/10 pt-4 mb-6">
        <span class="text-sm text-gray-400 font-medium">Total a cobrar:</span>
        <span id="order-total" class="text-2xl font-bold text-gold-400 serif-title"></span>
      </div>

      <!-- Botón de Confirmación -->
      <div id="action-container">
        <button id="confirm-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl transition duration-300 tracking-wide flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
          Marcar como Entregado
        </button>
      </div>
    </div>

    <!-- 4. Éxito de Confirmación -->
    <div id="success-container" class="hidden glass-card p-8 rounded-2xl border border-white/5 shadow-2xl text-center animate-scale-up">
      <div class="mx-auto w-16 h-16 bg-emerald-500/20 border border-emerald-500 text-emerald-400 rounded-full flex items-center justify-center mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <h2 class="serif-title text-2xl font-bold text-white mb-2">¡Pedido Entregado!</h2>
      <p class="text-sm text-gray-400 mb-6">El stock ha sido descontado y el estado se actualizó a entregado.</p>
      <button onclick="window.close()" class="px-6 py-2.5 bg-dark-700 hover:bg-dark-600 border border-white/10 rounded-xl text-xs font-semibold tracking-wider uppercase transition">
        Cerrar pestaña
      </button>
    </div>

  </div>

  <!-- Firebase Integration Script -->
  <script type="module" src="confirm.js?v=1.3"></script>
</body>
</html>
